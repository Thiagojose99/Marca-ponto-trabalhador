<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Folha de Ponto - Histórico</title>
    <link rel="stylesheet" href="style.css">
    
</head>
<body>

    <div class="main-container" style="max-width: 600px;">
        <header class="header-hist">
            <a href="index.html" class="btn-voltar">⬅ Voltar</a>
            <h2 style="margin: 0; font-size: 1.1rem; color: var(--green-success);">FOLHA DE PONTO MENSAL</h2>
        </header>

        <div class="resumo-topo">
            <div>
                <span style="display:block; font-size:0.7rem; color:var(--text-muted)">SALDO DO CICLO</span>
                <strong id="saldoAcumulado" style="font-size: 1.4rem;">00:00</strong>
            </div>
            <div style="text-align: right;">
                <span style="display:block; font-size:0.7rem; color:var(--text-muted)">FECHAMENTO</span>
                <strong id="infoCiclo" style="font-size: 1rem;">DIA 25</strong>
            </div>
        </div>

        <div class="tabela-container">
            <table>
                <thead>
                    <tr>
                        <th class="col-data">Data</th>
                        <th>Batidas</th>
                        <th>Total</th>
                        <th>Saldo</th>
                    </tr>
                </thead>
                <tbody id="corpoTabela">
                    </tbody>
            </table>
        </div>

        <footer class="dev">
            Thiago &copy; 2026 Historico 
        </footer>
    </div>

    <script>
        const META_MINUTOS = 440; 
        let DIA_FECHAMENTO = parseInt(localStorage.getItem('dia_fechamento') || '25');

        function getDB() { 
            return JSON.parse(localStorage.getItem('brutus_final_v6') || '[]'); 
        }

        function formatarHhMm(minutosTotal, comSinal = false) {
            const isNegativo = minutosTotal < 0;
            const minAbs = Math.abs(minutosTotal);
            const h = Math.floor(minAbs / 60);
            const m = minAbs % 60;
            let sinal = comSinal ? (isNegativo ? "-" : "+") : (isNegativo ? "-" : "");
            return `${sinal}${h > 0 ? h + 'h' : ''}${String(m).padStart(2, '0')}m`;
        }

        function pertenceAoCicloAtual(dataStr) {
            const hoje = new Date();
            const [dia, mes, ano] = dataStr.split('/').map(Number);
            const dataReg = new Date(ano, mes - 1, dia);
            let inicio, fim;
            if (hoje.getDate() > DIA_FECHAMENTO) {
                inicio = new Date(hoje.getFullYear(), hoje.getMonth(), DIA_FECHAMENTO + 1);
                fim = new Date(hoje.getFullYear(), hoje.getMonth() + 1, DIA_FECHAMENTO);
            } else {
                inicio = new Date(hoje.getFullYear(), hoje.getMonth() - 1, DIA_FECHAMENTO + 1);
                fim = new Date(hoje.getFullYear(), hoy.getMonth(), DIA_FECHAMENTO);
            }
            return dataReg >= inicio && dataReg <= fim;
        }

        function carregarTabela() {
            const db = getDB();
            const corpo = document.getElementById('corpoTabela');
            let saldoTotalCiclo = 0;

            const grupos = db.reduce((acc, r) => {
                (acc[r.data] = acc[r.data] || []).push(r);
                return acc;
            }, {});

            const datasOrdenadas = Object.keys(grupos).sort((a, b) => {
                const dateA = a.split('/').reverse().join('');
                const dateB = b.split('/').reverse().join('');
                return dateB.localeCompare(dateA);
            });

            corpo.innerHTML = '';

            datasOrdenadas.forEach(data => {
                const registros = grupos[data];
                let minTrabalhados = 0;
                
                // Formata as batidas para a coluna (ex: 08:00 | 12:00)
                const batidasStr = registros.map(r => r.hora).join(' | ');

                // Cálculo das horas trabalhadas
                for (let i = 0; i < registros.length; i += 2) {
                    if (registros[i+1]) {
                        minTrabalhados += Math.round((registros[i+1].ts - registros[i].ts) / 60000);
                    }
                }

                const saldoDia = minTrabalhados - META_MINUTOS;
                const classeSaldo = saldoDia >= 0 ? 'saldo-pos' : 'saldo-neg';

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="col-data">${data.split('/')[0]}/${data.split('/')[1]}</td>
                    <td class="col-batidas">${batidasStr}</td>
                    <td>${formatarHhMm(minTrabalhados)}</td>
                    <td class="${classeSaldo}">${formatarHhMm(saldoDia, true)}</td>
                `;
                corpo.appendChild(tr);

                if (pertenceAoCicloAtual(data)) {
                    saldoTotalCiclo += saldoDia;
                }
            });

            document.getElementById('saldoAcumulado').innerText = formatarHhMm(saldoTotalCiclo, true);
            document.getElementById('saldoAcumulado').className = saldoTotalCiclo >= 0 ? 'saldo-pos' : 'saldo-neg';
            document.getElementById('infoCiclo').innerText = `DIA ${DIA_FECHAMENTO}`;
        }

        window.onload = carregarTabela;
    </script>
</body>
</html>
