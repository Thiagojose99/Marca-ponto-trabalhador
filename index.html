<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Ponto Pro</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
</head>
<body>

    <div class="main-container">
        <header>
            
   
    <div class="config-section">
        <label for="inputFechamento">Dia de Fechamento: </label>
        <input type="number" id="inputFechamento" min="1" max="31" value="25">
        <button id="btnSalvarConfig" class="btn-edit">Salvar</button>
    </div>

            <h1>REGISTRO DE PONTO</h1>
            <div class="meta-box">Meta Diária: <strong>07:20</strong></div>
        </header>

        <section class="dashboard">
            <div class="dash-item">
                <span>Trabalhado Hoje</span>
                <strong id="tempoTrabalhadoReal">00:00:00</strong>
            </div>
            <div class="dash-item">
                <span>Total:</span>
                <strong id="totalCiclo">-7h20m</strong>
            </div>
        </section>

        <section class="controls">
            <div id="statusAtual">PAUSADO</div>
            <button class="btn-main blue-theme" id="btnGravar">BATER PONTO AGORA</button>
            <div id="saldoLabel" style="text-align: center; font-size: 0.9rem; margin-top: 8px; color: #94a3b8;">Faltam 07:20</div>
            
            <div class="secondary-actions">
                <button class="btn-sec" id="btnCamera">📷 ANEXAR FOTO</button>
                <button class="btn-sec" id="btnOcorrencia">⚠️ OCORRÊNCIA</button>
            </div>
            
            <a href="historico.html" class="btn-history-full">📅 ACESSAR HISTÓRICO MENSAL</a>
        </section>

        <div id="historicoDias"></div>

        <div class="footer-controls">
            <button class="btn-ghost" id="btnPDF">Gerar PDF</button>
            <button class="btn-ghost" id="btnLimpar">Limpar Histórico</button>
        </div>
           <br>
        <footer class="dev">Desenvolvido por Thiago &copy; 2026</footer>
    </div>

    <div id="modalOcorrencia" class="modal">
        <div class="modal-content">
            <h3>Lançar Ocorrência</h3>
            <label>Data:</label>
            <input type="date" id="ocData">
            <label>Hora:</label>
            <input type="time" id="ocHora">
            <label>Motivo:</label>
            <select id="ocMotivo">
                <option value="Esquecimento">Esquecimento</option>
                <option value="Problema Técnico">Problema Técnico</option>
                <option value="Trabalho Externo">Trabalho Externo</option>
                <option value="Outros">Outros</option>
            </select>
            <div class="modal-buttons">
                <button class="btn-main blue-theme" id="btnSalvarOcorrencia">SALVAR</button>
                <button class="btn-ghost" id="btnFecharOcorrencia" style="color:white">CANCELAR</button>
            </div>
        </div>
    </div>

    <div id="cameraModal" class="modal">
        <video id="video" width="320" height="240" autoplay></video>
        <div class="modal-buttons">
            <button class="btn-main blue-theme" id="btnCapturar">TIRAR FOTO</button>
            <button class="btn-ghost" id="btnFecharCam" style="color: white;">CANCELAR</button>
        </div>
        <canvas id="canvas" width="320" height="240" style="display:none;"></canvas>
    </div>

    <script src="js.js"></script>
</body>
</html>
